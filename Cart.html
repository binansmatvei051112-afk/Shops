<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Phone Shop - Корзина</title>
    <link rel="stylesheet" href="Shops.css">
</head>

<body>
    <div class="prev">
        <div class="logo">LOGOPHONE</div>
        <img src="https://cdn-icons-png.flaticon.com/512/12765/12765761.png" alt="Home Icon" class="home-icon">
        <a href="index.html">Каталог</a>
        <img src="https://cdn-icons-png.flaticon.com/512/6463/6463564.png" alt="Cart Icon" class="cart-icon">
        <a href="Cart.html">Корзина</a>
        <img src="https://cdn-icons-png.flaticon.com/512/943/943593.png" alt="Info Icon" class="info-icon">
        <a href="About_us.html">О нас</a>
        <img src="https://cdn-icons-png.flaticon.com/512/837/837877.png" alt="Support Icon" class="support-icon">
        <a href="Support.html">Поддержка</a>
    </div>
    <div class="content-box">
        <h1>Ваша корзина</h1>

        <div class="cart-container">
            <div class="cart-item">
                <img src="https://ir.ozone.ru/s3/multimedia-1-u/6970022958.jpg" class="cart-img">

                <div class="cart-info">
                    <h3>iPhone 15 Pro</h3>
                    <p>Цвет: Black Titanium</p>
                </div>

                <div class="cart-quantity">
                    <button class="qty-btn-minus-btn">-</button>
                    <span class="qty-num" id="Schet">1</span>
                    <button class="qty-btn-plus-btn">+</button>
                </div>

                <div class="cart-price">99 990 ₽</div>

                <button class="remove-btn">Удалить</button>
            </div>

            <div class="cart-summary">
                <div class="total-text">Итого к оплате: <span id="total-price">99 990 ₽</span></div>
                <button class="checkout-btn">Оформить заказ</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
